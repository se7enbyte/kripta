name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: kripta-macos
          - os: windows-latest
            artifact: kripta-windows
          - os: ubuntu-latest
            artifact: kripta-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot
      - name: Build package (Unix)
        if: runner.os != 'Windows'
        run: chmod +x setup.sh package.sh && ./package.sh
      - name: Build package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force lib, out, package-input, dist
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/1.84/bcprov-jdk18on-1.84.jar" -OutFile "lib/bcprov-jdk18on-1.84.jar"
          $sources = Get-ChildItem -Recurse src/main -Filter *.java | ForEach-Object { $_.FullName }
          javac -cp "lib/*" -d out $sources
          jar --create --file package-input/kripta.jar --main-class dev.kripta.Gui -C out .
          Copy-Item lib/*.jar package-input/
          jpackage --type msi --name kripta --app-version 2.0.0 --vendor kripta --input package-input --main-jar kripta.jar --main-class dev.kripta.Gui --dest dist
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
